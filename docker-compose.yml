version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mednxt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mednxt
      - DEFAULT_TENANT_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      - db
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
