<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNXT HHRM – Phase 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0d0f1c; --surface: rgba(20,23,40,0.9); --card: rgba(26,30,50,0.85);
            --primary: #6366f1; --secondary: #a855f7; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b;
            --text: #f1f5f9; --muted: #94a3b8; --border: rgba(255,255,255,0.07);
            --blur: blur(14px);
        }
        * { box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh;
            background-image: radial-gradient(ellipse at 0% 0%,rgba(99,102,241,.13) 0,transparent 55%), radial-gradient(ellipse at 100% 100%,rgba(168,85,247,.13) 0,transparent 55%);
            background-attachment:fixed; }
        .navbar { background:var(--surface); backdrop-filter:var(--blur); border-bottom:1px solid var(--border); padding:.9rem 2rem; position:sticky; top:0; z-index:100; }
        .brand { font-size:1.4rem; font-weight:700; color:#fff; display:flex; align-items:center; gap:10px; text-decoration:none; }
        .brand-accent { background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .badge-phase { background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:#818cf8; font-size:.7rem; padding:3px 10px; border-radius:20px; font-weight:600; }
        .sidebar { background:var(--surface); backdrop-filter:var(--blur); border-right:1px solid var(--border); min-height:calc(100vh - 58px); padding:1.5rem .8rem; width:220px; flex-shrink:0; }
        .sidebar-label { font-size:.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; padding:0 12px; margin-bottom:.8rem; }
        .nav-link { color:var(--muted); cursor:pointer; font-weight:500; padding:10px 16px; border-radius:10px; transition:all .25s; display:flex; align-items:center; gap:10px; font-size:.95rem; margin-bottom:4px; }
        .nav-link:hover { color:#fff; background:rgba(255,255,255,.05); transform:translateX(4px); }
        .nav-link.active { color:#fff; background:linear-gradient(135deg,rgba(99,102,241,.22),rgba(168,85,247,.18)); border:1px solid rgba(99,102,241,.28); }
        .main-wrap { display:flex; }
        .main-content { flex:1; padding:2rem 2.5rem; overflow-x:hidden; }
        .stat-card { background:var(--card); backdrop-filter:var(--blur); border:1px solid var(--border); border-radius:16px; padding:1.4rem 1.6rem; display:flex; align-items:center; gap:1rem; transition:all .3s; cursor:pointer; }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.35); }
        .stat-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
        .stat-value { font-size:2rem; font-weight:700; line-height:1; }
        .stat-label { font-size:.85rem; color:var(--muted); margin-top:2px; }
        .glass-card { background:var(--card); backdrop-filter:var(--blur); border:1px solid var(--border); border-radius:18px; padding:1.5rem; box-shadow:0 8px 24px rgba(0,0,0,.25); animation:fadeUp .4s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .table { color:var(--text); margin-bottom:0; }
        .table th { border-bottom:1px solid var(--border); color:var(--muted); font-weight:500; text-transform:uppercase; font-size:.75rem; letter-spacing:.8px; padding:14px 10px; }
        .table td { border-bottom:1px solid rgba(255,255,255,.03); padding:13px 10px; vertical-align:middle; }
        .table tbody tr:hover { background:rgba(255,255,255,.02); }
        .badge-active { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.25); padding:4px 12px; border-radius:20px; font-size:.78rem; font-weight:600; cursor:pointer; transition:all .2s; }
        .badge-inactive { background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.25); padding:4px 12px; border-radius:20px; font-size:.78rem; font-weight:600; cursor:pointer; transition:all .2s; }
        .badge-grade { background:rgba(99,102,241,.12); color:#818cf8; border:1px solid rgba(99,102,241,.25); padding:4px 12px; border-radius:20px; font-size:.78rem; font-weight:600; }
        .btn-primary-gradient { background:linear-gradient(135deg,var(--primary),var(--secondary)); border:none; color:#fff; font-weight:600; border-radius:10px; padding:9px 22px; box-shadow:0 4px 14px rgba(99,102,241,.38); transition:all .25s; }
        .btn-primary-gradient:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(99,102,241,.55); color:#fff; }
        .btn-glass { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text); border-radius:9px; padding:7px 14px; transition:all .2s; }
        .btn-glass:hover { background:rgba(255,255,255,.1); color:#fff; }
        .btn-icon { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 10px; transition:all .2s; }
        .btn-icon:hover { color:#fff; background:rgba(255,255,255,.1); }
        .btn-icon.danger:hover { color:var(--danger); border-color:rgba(239,68,68,.3); background:rgba(239,68,68,.1); }
        .btn-seed { background:linear-gradient(135deg,#10b981,#059669); border:none; color:#fff; font-weight:600; border-radius:10px; padding:9px 22px; transition:all .25s; }
        .btn-seed:hover { transform:translateY(-2px); color:#fff; }
        .search-bar { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:9px 14px; transition:all .2s; width:240px; }
        .search-bar:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,.07); color:#fff; box-shadow:0 0 0 3px rgba(99,102,241,.18); }
        .search-bar::placeholder { color:#475569; }
        .filter-select { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:9px 14px; }
        .filter-select:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,.07); color:#fff; box-shadow:0 0 0 3px rgba(99,102,241,.18); }
        .filter-select option { background:#131728; }
        .avatar { width:40px; height:40px; border-radius:12px; background:rgba(99,102,241,.18); color:#818cf8; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; flex-shrink:0; }
        .page-btn { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 14px; transition:all .2s; cursor:pointer; }
        .page-btn:hover,.page-btn.active { background:rgba(99,102,241,.2); border-color:rgba(99,102,241,.4); color:#fff; }
        .page-btn:disabled { opacity:.4; cursor:not-allowed; }
        .modal-content { background:#131728; border:1px solid var(--border); border-radius:18px; }
        .modal-header { border-bottom:1px solid var(--border); padding:1.3rem 1.8rem; }
        .modal-body { padding:1.5rem 1.8rem; }
        .modal-footer { border-top:1px solid var(--border); padding:1rem 1.8rem; }
        .form-label { color:var(--muted); font-size:.87rem; font-weight:500; margin-bottom:5px; }
        .form-control,.form-select { background:rgba(255,255,255,.05); border:1px solid var(--border); color:#fff; border-radius:10px; padding:9px 13px; transition:all .2s; }
        .form-control:focus,.form-select:focus { background:rgba(255,255,255,.08); border-color:var(--primary); color:#fff; box-shadow:0 0 0 3px rgba(99,102,241,.18); }
        .form-control::placeholder { color:#475569; }
        .form-select option { background:#131728; }
        .section-divider { border:none; border-top:1px solid var(--border); margin:1.2rem 0; }
        .section-title { font-size:.78rem; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); font-weight:600; margin-bottom:1rem; }
        .profile-avatar { width:72px; height:72px; border-radius:18px; background:rgba(99,102,241,.2); color:#818cf8; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; }
        .profile-field { margin-bottom:.9rem; }
        .profile-field-label { font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
        .empty-state { text-align:center; padding:4rem 2rem; }
        .empty-state i { font-size:3.5rem; color:var(--muted); opacity:.35; display:block; margin-bottom:1rem; }
        .toast-container { z-index:9999; }
        .toast { background:#1a1e32; border:1px solid var(--border); border-radius:12px; min-width:280px; }
        .chart-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:1.5rem; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#2d3554; border-radius:3px; }

        @media print {
            .navbar,.sidebar,.modal-footer,.btn-icon,.btn-glass,.btn-primary-gradient,.btn-seed { display:none !important; }
            .main-content { padding:0 !important; }
            .glass-card { box-shadow:none !important; border:1px solid #ccc !important; }
        }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">

            <div class="toast-body fw-medium d-flex align-items-center gap-2" id="toastMsg"></div>

<!-- Navbar -->

    <div class="container-fluid d-flex align-items-center justify-content-between">
        <a class="brand" href="#"><i class="ph-fill ph-hospital" style="color:#818cf8;"></i>MedNXT <span class="brand-accent">HHRM</span><span class="badge-phase">Phase 2</span></a>
        <div class="d-flex align-items-center gap-3">
            <div style="font-size:.85rem;color:var(--muted);" class="d-flex align-items-center gap-2"><i class="ph ph-buildings"></i>Default Hospital</div>
            
            <!-- RBAC Role Switcher -->
            <div class="d-flex align-items-center gap-2" style="background:rgba(255,255,255,.05); border:1px solid var(--border); padding:4px 10px; border-radius:10px;">

            <a href="/docs" class="btn btn-glass d-flex align-items-center gap-2" style="font-size:.88rem;"><i class="ph ph-code"></i>API Docs</a>

</nav>

        </ul>
    </div>

    <div class="main-content" id="main-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API='/api/v1', TID='00000000-0000-0000-0000-000000000001';
let currentRole = localStorage.getItem('user_role') || 'ADMIN';

// Set select element value after load
window.addEventListener('DOMContentLoaded', () => {
    const rs = document.getElementById('roleSwitcher');
    if (rs) rs.value = currentRole;
});

function getHeaders() {
    return {
        'X-Tenant-ID': TID,
        'Content-Type': 'application/json',
        'X-User-Role': currentRole
    };
}

let currentModule='dashboard', currentPage=1, searchTimer=null;
let chartCat=null, chartDept=null;

function toast(msg,ok=true){
    const el=document.getElementById('appToast');
    el.style.borderLeft=`4px solid ${ok?'#10b981':'#ef4444'}`;
    document.getElementById('toastMsg').innerHTML=`<i class="ph ${ok?'ph-check-circle text-success':'ph-x-circle text-danger'} me-2"></i>${msg}`;
    new bootstrap.Toast(el,{delay:3000}).show();
}

function updateRole(newRole) {
    currentRole = newRole;
    localStorage.setItem('user_role', newRole);
    toast(`Switched role to: ${newRole}`);
}

async function api(path,opts={}){ return fetch(API+path,{headers:getHeaders(),...opts}); }

async function checkRes(res, defaultMsg) {
    if (res.ok) return true;
    let detail = defaultMsg;
    try {
        const err = await res.json();
        if (err && err.detail) {
            detail = typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail);
        }
    } catch(e) {}
    toast(detail, false);
    return false;
}

// ── Seed Data ──
async function seedData(){
    if(!confirm('Load PDF sample data? (Departments, Designations, 10 Employees)')) return;
    const res=await api('/seed/demo-data',{method:'POST'});
    const data=await res.json();
    if(res.ok){ toast(data.message); showDashboard(); }
    else toast('Error loading demo data!',false);
}

// ── Dashboard ──
async function showDashboard(){
    setNav('dashboard'); currentModule='dashboard';
    document.getElementById('main-content').innerHTML=`<div class="d-flex justify-content-center py-5"><div class="spinner-border text-primary"></div></div>`;
    const [dRes,dgRes,eRes]=await Promise.all([api('/departments?page_size=100'),api('/designations?page_size=100'),api('/employees?page_size=100')]);
    const [d,dg,e]=await Promise.all([dRes.json(),dgRes.json(),eRes.json()]);

    // Category breakdown for chart
    const catCount={};
    (e.items||[]).forEach(emp=>{ const c=emp.category||'OTHER'; catCount[c]=(catCount[c]||0)+1; });

    document.getElementById('main-content').innerHTML=`
        <div class="mb-4"><h2 style="font-weight:700;">Dashboard</h2><p style="color:var(--muted);">Hospital Human Resource Management — Phase 1</p></div>
        <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="stat-card" onclick="loadModule('departments')">
                <div class="stat-icon" style="background:rgba(99,102,241,.15);"><i class="ph-fill ph-buildings" style="color:#818cf8;"></i></div>
                <div><div class="stat-value">${d.total}</div><div class="stat-label">Total Departments</div></div>
            </div></div>
            <div class="col-md-4"><div class="stat-card" onclick="loadModule('designations')">

function onSearch(val){ clearTimeout(searchTimer); searchTimer=setTimeout(()=>fetchData(currentModule,1,val),400); }

async function fetchData(mod,page=1,search=''){
    currentPage=page;
    const status=document.getElementById('statusFilter')?.value||'';
    let url=`/${mod}?page=${page}&page_size=10`;
    if(search) url+=`&search=${encodeURIComponent(search)}`;
    if(status) url+=`&status=${status}`;
    try{
        const res=await api(url); const data=await res.json();
        const total=data.pages||1;
        document.getElementById('recordCount').innerText=`${data.total} record${data.total!==1?'s':''} found`;
        renderTable(mod,data.items||[]);
        renderPagination(page,total,search);
    }catch{ document.getElementById('table-body').innerHTML=`<tr><td colspan="6"><div class="empty-state"><i class="ph ph-warning"></i><h5>Connection Error</h5></div></td></tr>`; }
}

// ── CSV Export ──
async function exportCSV(mod){
    const res=await api(`/${mod}?page_size=500`); const data=await res.json();
    const items=data.items||[];
    if(!items.length){ toast('No data to export!',false); return; }
    let headers, rows;
    if(mod==='departments'){ headers=['Name','Code','Cost Center','Status','Created']; rows=items.map(r=>[r.name,r.code||'',r.cost_center||'',r.status,r.created_at?.split('T')[0]||'']); }
    else if(mod==='designations'){ headers=['Name','Code','Grade','Status','Created']; rows=items.map(r=>[r.name,r.code||'',r.grade||'',r.status,r.created_at?.split('T')[0]||'']); }
    else{ headers=['EMP Code','First Name','Last Name','Email','Phone','Category','Gender','Blood Group','Qualification','Specialty','Experience','Joining Date','Status']; rows=items.map(r=>[r.employee_code,r.first_name,r.last_name||'',r.email||'',r.phone||'',r.category||'',r.gender||'',r.blood_group||'',r.qualification||'',r.specialty||'',r.experience_years||'',r.joining_date||'',r.employment_status]); }
    const csv=[headers,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`mednxt_${mod}_${Date.now()}.csv`; a.click();
    toast('CSV exported!');
}

async function toggleStatus(mod,id,current){
    const newStatus=current==='ACTIVE'?'INACTIVE':'ACTIVE';
    const res=await api(`/${mod}/${id}`,{method:'PUT',body:JSON.stringify(current==='ACTIVE'?{status:'INACTIVE'}:{status:'ACTIVE',employment_status:'ACTIVE'})});
    if(await checkRes(res, 'Error updating status!')){ toast(`Status changed to ${newStatus}`); fetchData(mod,currentPage); }
}

function renderPagination(page,total,search){
    const el=document.getElementById('paginationArea'); if(!el) return;

    el.innerHTML=`<span style="color:var(--muted);font-size:.85rem;">Page ${page} of ${total}</span>
    <div class="d-flex gap-2">
        <button class="page-btn" onclick="fetchData('${currentModule}',${page-1},'${search}')" ${page<=1?'disabled':''}>← Prev</button>
        <button class="page-btn" onclick="fetchData('${currentModule}',${page+1},'${search}')" ${page>=total?'disabled':''}>Next →</button>

async function uploadDoc(empId, input){
    if(!input.files.length) return;
    const file = input.files[0];
    const formData = new FormData();
    formData.append('file', file);
    
    // Create new headers without Content-Type so browser sets boundary automatically
    const fdHeaders = { 'X-Tenant-ID': TID, 'X-User-Role': currentRole };
    const res = await fetch(API+`/employees/${empId}/documents`, { method: 'POST', headers: fdHeaders, body: formData });
    
    if(await checkRes(res, 'Failed to upload document!')) {
        toast('Document uploaded successfully!');
        // Refresh modal safely
        bootstrap.Modal.getInstance(document.getElementById('profileModal')).hide();
        const rRes = await api(`/employees/${empId}`);
        const rData = await rRes.json();
        viewProfile(rData);
    }
}

    if(!body.first_name){toast('First name required!',false);return;}
    const res=await api(id?`/employees/${id}`:'/employees',{method:id?'PUT':'POST',body:JSON.stringify(body)});
    if(await checkRes(res, 'Error saving employee!')){bootstrap.Modal.getInstance(document.getElementById('empModal')).hide();toast(id?'Updated!':'Employee created!');fetchData('employees',currentPage);}
}

async function deleteDoc(empId, docId, empName) {
    if(!confirm('Are you sure you want to delete this document?')) return;
    const res = await api(`/employees/${empId}/documents/${docId}`, { method: 'DELETE' });
    if(await checkRes(res, 'Error deleting document!')) {
        toast('Document deleted!');
        // Refresh the profile modal by fetching the updated employee data if needed, or simply re-open it
        // We can just fetch the employee from the current array since it's already in memory
        const emp = [...dataCache.employees.items].find(e => e.id === empId) || {id: empId, first_name: empName};
        viewProfile(emp); 
    }
}

showDashboard();
</script>
