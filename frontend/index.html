<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNXT HHRM - Phase 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .navbar { background-color: #1f1f1f; border-bottom: 1px solid #333; }
        .navbar-brand { color: #fff; font-weight: bold; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .table { color: #e0e0e0; }
        .table-striped>tbody>tr:nth-of-type(odd)>* { color: #e0e0e0; }
        .form-control, .form-select { background-color: #2c2c2c; color: #fff; border: 1px solid #444; }
        .form-control:focus, .form-select:focus { background-color: #333; color: #fff; box-shadow: none; border-color: #666; }
        .btn-primary { background-color: #0d6efd; border: none; }
        .sidebar { background-color: #1a1a1a; min-height: calc(100vh - 56px); border-right: 1px solid #333; padding: 20px 0; }
        .nav-link { color: #bbb; margin-bottom: 10px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: #fff; background-color: #333; border-radius: 4px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">MedNXT HHRM</a>
        <span class="text-muted ms-auto">Tenant: Default Hospital</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" id="nav-departments" onclick="showModule('departments')">Departments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="nav-designations" onclick="showModule('designations')">Designations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="nav-employees" onclick="showModule('employees')">Employees</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4" id="main-content">
            <!-- Content will be injected here by JS -->
            <h2>Welcome to MedNXT HHRM Phase 1</h2>
            <p>Select a module from the sidebar to manage data.</p>
            <p class="text-success" id="api-status">Checking API connection...</p>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8000/api/v1";
    const TENANT_ID = "00000000-0000-0000-0000-000000000001";

    async function checkAPI() {
        try {
            const res = await fetch("http://localhost:8000/");
            if(res.ok) document.getElementById('api-status').innerText = "API Connected Successfully!";
        } catch (e) {
            document.getElementById('api-status').innerText = "API Connection Failed. Is backend running?";
            document.getElementById('api-status').className = "text-danger";
        }
    }
    checkAPI();

    function showModule(module) {
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${module}`).classList.add('active');
        
        let html = `<h3>${module.charAt(0).toUpperCase() + module.slice(1)} Management</h3>`;
        html += `<button class="btn btn-primary mb-3" onclick="alert('Add functionality coming soon via JS!')">Add New</button>`;
        html += `<p>Data table for ${module} will load here. (See Swagger docs at /docs for full API testing).</p>`;
        
        document.getElementById('main-content').innerHTML = html;
        // In a real app, we'd fetch data here: fetch(\`\${API_URL}/\${module}\`, {headers: {'X-Tenant-ID': TENANT_ID}})
    }
</script>
</body>
</html>
