<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNXT HHRM – Phase 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0d0f1c;
            --surface: rgba(20,23,40,0.9);
            --card: rgba(26,30,50,0.85);
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
            --blur: blur(14px);
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 0% 0%, rgba(99,102,241,0.13) 0, transparent 55%),
                radial-gradient(ellipse at 100% 100%, rgba(168,85,247,0.13) 0, transparent 55%);
            background-attachment: fixed;
        }
        /* ── Navbar ── */
        .navbar {
            background: var(--surface);
            backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border);
            padding: .9rem 2rem;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { font-size: 1.4rem; font-weight: 700; color: #fff; display:flex; align-items:center; gap:10px; text-decoration:none; }
        .brand-accent { background: linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .badge-phase { background: rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.3); color:#818cf8; font-size:.7rem; padding:3px 10px; border-radius:20px; font-weight:600; }
        /* ── Sidebar ── */
        .sidebar {
            background: var(--surface);
            backdrop-filter: var(--blur);
            border-right: 1px solid var(--border);
            min-height: calc(100vh - 58px);
            padding: 1.5rem .8rem;
            width: 220px; flex-shrink:0;
        }
        .sidebar-label { font-size:.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; padding: 0 12px; margin-bottom:.8rem; }
        .nav-item { margin-bottom:4px; }
        .nav-link {
            color: var(--muted); cursor:pointer; font-weight:500;
            padding: 10px 16px; border-radius:10px;
            transition: all .25s; display:flex; align-items:center; gap:10px; font-size:.95rem;
        }
        .nav-link:hover { color:#fff; background:rgba(255,255,255,0.05); transform:translateX(4px); }
        .nav-link.active { color:#fff; background:linear-gradient(135deg,rgba(99,102,241,0.22),rgba(168,85,247,0.18)); border:1px solid rgba(99,102,241,0.28); }
        /* ── Main ── */
        .main-wrap { display:flex; }
        .main-content { flex:1; padding:2rem 2.5rem; overflow-x:hidden; }
        /* ── Stats Cards ── */
        .stat-card {
            background: var(--card);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.4rem 1.6rem;
            display:flex; align-items:center; gap:1rem;
            transition: all .3s;
        }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.35); }
        .stat-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
        .stat-value { font-size:2rem; font-weight:700; line-height:1; }
        .stat-label { font-size:.85rem; color:var(--muted); margin-top:2px; }
        /* ── Glass Card ── */
        .glass-card {
            background: var(--card);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,.25);
            animation: fadeUp .4s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        /* ── Table ── */
        .table { color:var(--text); margin-bottom:0; }
        .table th { border-bottom:1px solid var(--border); color:var(--muted); font-weight:500; text-transform:uppercase; font-size:.75rem; letter-spacing:.8px; padding:14px 10px; }
        .table td { border-bottom:1px solid rgba(255,255,255,0.03); padding:13px 10px; vertical-align:middle; }
        .table tbody tr { transition:background .15s; }
        .table tbody tr:hover { background:rgba(255,255,255,0.02); }
        /* ── Badges ── */
        .badge-active { background:rgba(16,185,129,0.12); color:#10b981; border:1px solid rgba(16,185,129,0.25); padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:600; }
        .badge-inactive { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.25); padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:600; }
        .badge-grade { background:rgba(99,102,241,0.12); color:#818cf8; border:1px solid rgba(99,102,241,0.25); padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:600; }
        /* ── Buttons ── */
        .btn-primary-gradient {
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            border:none; color:#fff; font-weight:600; border-radius:10px; padding:9px 22px;
            box-shadow:0 4px 14px rgba(99,102,241,.38); transition:all .25s;
        }
        .btn-primary-gradient:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(99,102,241,.55); color:#fff; }
        .btn-glass { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); border-radius:9px; padding:7px 14px; transition:all .2s; }
        .btn-glass:hover { background:rgba(255,255,255,0.1); color:#fff; }
        .btn-icon { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 10px; transition:all .2s; }
        .btn-icon:hover { color:#fff; background:rgba(255,255,255,0.1); }
        .btn-icon.danger:hover { color:var(--danger); border-color:rgba(239,68,68,.3); background:rgba(239,68,68,.1); }
        /* ── Search/Filter ── */
        .search-bar { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:9px 14px; transition:all .2s; width:260px; }
        .search-bar:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,0.07); box-shadow:0 0 0 3px rgba(99,102,241,.18); color:#fff; }
        .search-bar::placeholder { color:#475569; }
        .filter-select { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:9px 14px; }
        .filter-select:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,0.07); color:#fff; box-shadow:0 0 0 3px rgba(99,102,241,.18); }
        .filter-select option { background:#1a1e32; }
        /* ── Avatar ── */
        .avatar { width:40px; height:40px; border-radius:12px; background:rgba(99,102,241,.18); color:#818cf8; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; flex-shrink:0; }
        /* ── Pagination ── */
        .page-btn { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 14px; transition:all .2s; cursor:pointer; }
        .page-btn:hover, .page-btn.active { background:rgba(99,102,241,.2); border-color:rgba(99,102,241,.4); color:#fff; }
        .page-btn:disabled { opacity:.4; cursor:not-allowed; }
        /* ── Modals ── */
        .modal-content { background:#131728; border:1px solid var(--border); border-radius:18px; }
        .modal-header { border-bottom:1px solid var(--border); padding:1.3rem 1.8rem; }
        .modal-body { padding:1.5rem 1.8rem; }
        .modal-footer { border-top:1px solid var(--border); padding:1rem 1.8rem; }
        .form-label { color:var(--muted); font-size:.87rem; font-weight:500; margin-bottom:5px; }
        .form-control, .form-select {
            background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff;
            border-radius:10px; padding:9px 13px; transition:all .2s;
        }
        .form-control:focus, .form-select:focus { background:rgba(255,255,255,0.08); border-color:var(--primary); color:#fff; box-shadow:0 0 0 3px rgba(99,102,241,.18); }
        .form-control::placeholder { color:#475569; }
        .form-select option { background:#131728; }
        .section-divider { border:none; border-top:1px solid var(--border); margin:1.2rem 0; }
        .section-title { font-size:.78rem; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); font-weight:600; margin-bottom:1rem; }
        /* ── Profile Panel ── */
        .profile-panel { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:1.5rem; animation:fadeUp .3s ease; }
        .profile-avatar { width:72px; height:72px; border-radius:18px; background:rgba(99,102,241,.2); color:#818cf8; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; }
        .profile-field { margin-bottom:.9rem; }
        .profile-field-label { font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
        .profile-field-value { font-weight:500; }
        /* ── Empty State ── */
        .empty-state { text-align:center; padding:4rem 2rem; }
        .empty-state i { font-size:3.5rem; color:var(--muted); opacity:.35; display:block; margin-bottom:1rem; }
        /* ── Toast ── */
        .toast-container { z-index:9999; }
        .toast { background:#1a1e32; border:1px solid var(--border); border-radius:12px; min-width:260px; }
        /* Scrollbar */
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#2d3554; border-radius:3px; }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-medium d-flex align-items-center gap-2" id="toastMsg"></div>

<!-- Navbar -->
<nav class="navbar">
    <div class="container-fluid d-flex align-items-center justify-content-between">

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '/api/v1';
const TID = '00000000-0000-0000-0000-000000000001';
const H = { 'X-Tenant-ID': TID, 'Content-Type': 'application/json' };
let currentModule = 'dashboard';
let currentPage = 1; let totalPages = 1; let searchTimer = null;
let depts = []; let desigs = [];

// ── Toast ──
function toast(msg, ok = true) {
    const el = document.getElementById('appToast');
    el.style.borderLeft = `4px solid ${ok ? '#10b981' : '#ef4444'}`;
    document.getElementById('toastMsg').innerHTML = `<i class="ph ${ok?'ph-check-circle text-success':'ph-x-circle text-danger'} me-2"></i>${msg}`;
    new bootstrap.Toast(el, { delay: 3000 }).show();
}

// ── API fetch helper ──
async function api(path, opts = {}) {
    const res = await fetch(API + path, { headers: H, ...opts });
    return res;
}

// ── Dashboard ──
async function showDashboard() {
    setNav('dashboard');
    currentModule = 'dashboard';
    document.getElementById('main-content').innerHTML = `<div class="d-flex justify-content-center py-5"><div class="spinner-border text-primary"></div></div>`;
    const [dRes, dgRes, eRes] = await Promise.all([
        api('/departments?page_size=1'), api('/designations?page_size=1'), api('/employees?page_size=1')
    ]);
    const [d, dg, e] = await Promise.all([dRes.json(), dgRes.json(), eRes.json()]);
    document.getElementById('main-content').innerHTML = `
        <div class="mb-4">
            <h2 style="font-weight:700;">Welcome to MedNXT HHRM</h2>
            <p style="color:var(--muted);">Hospital Human Resource Management — Phase 1</p>
        </div>
        <div class="row g-3 mb-5">
            <div class="col-md-4"><div class="stat-card">
                <div class="stat-icon" style="background:rgba(99,102,241,0.15);"><i class="ph-fill ph-buildings" style="color:#818cf8;"></i></div>
                <div><div class="stat-value">${d.total}</div><div class="stat-label">Total Departments</div></div>
            </div></div>
            <div class="col-md-4"><div class="stat-card">
                <div class="stat-icon" style="background:rgba(168,85,247,0.15);"><i class="ph-fill ph-tag" style="color:#c084fc;"></i></div>
                <div><div class="stat-value">${dg.total}</div><div class="stat-label">Total Designations</div></div>
            </div></div>
            <div class="col-md-4"><div class="stat-card">
                <div class="stat-icon" style="background:rgba(16,185,129,0.15);"><i class="ph-fill ph-users" style="color:#10b981;"></i></div>
                <div><div class="stat-value">${e.total}</div><div class="stat-label">Total Employees</div></div>
            </div></div>
        </div>
        <div class="row g-3">
            <div class="col-md-4"><div class="glass-card text-center p-4" style="cursor:pointer;" onclick="loadModule('departments')">
                <i class="ph ph-buildings fs-1 mb-3" style="color:#818cf8; display:block;"></i>
                <h5 class="fw-bold mb-1">Departments</h5>
                <p style="color:var(--muted); font-size:.9rem;">Manage hospital departments</p>
            </div></div>
            <div class="col-md-4"><div class="glass-card text-center p-4" style="cursor:pointer;" onclick="loadModule('designations')">
                <i class="ph ph-tag fs-1 mb-3" style="color:#c084fc; display:block;"></i>
                <h5 class="fw-bold mb-1">Designations</h5>
                <p style="color:var(--muted); font-size:.9rem;">Manage job roles and grades</p>
            </div></div>
            <div class="col-md-4"><div class="glass-card text-center p-4" style="cursor:pointer;" onclick="loadModule('employees')">
                <i class="ph ph-users fs-1 mb-3" style="color:#10b981; display:block;"></i>
                <h5 class="fw-bold mb-1">Employees</h5>
                <p style="color:var(--muted); font-size:.9rem;">Manage hospital staff</p>
            </div></div>
        </div>`;
}

// ── Set active nav ──
function setNav(mod) {
    document.querySelectorAll('.nav-link').forEach(e => e.classList.remove('active'));
    const el = document.getElementById(`nav-${mod}`);
    if (el) el.classList.add('active');
}

// ── Load Module ──
async function loadModule(mod, page = 1, search = '') {
    currentModule = mod; currentPage = page;
    setNav(mod);
    const info = {
        departments: { title: 'Departments', sub: 'Manage hospital departments and cost centers', icon: 'ph-buildings' },
        designations: { title: 'Designations', sub: 'Manage job roles, grades, and titles', icon: 'ph-tag' },
        employees: { title: 'Employees', sub: 'Manage all hospital staff and medical personnel', icon: 'ph-users' },
    };
    const i = info[mod];
    document.getElementById('main-content').innerHTML = `
        <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
            <div>
                <h2 style="font-weight:700;">${i.title}</h2>
                <p style="color:var(--muted); margin:0;">${i.sub}</p>
            </div>
            <button class="btn btn-primary-gradient d-flex align-items-center gap-2" onclick="openAddModal()">
                <i class="ph ph-plus-circle fs-5"></i> Add New
            </button>
        </div>
        <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
            <div style="position:relative;">
                <i class="ph ph-magnifying-glass" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);"></i>
                <input type="text" class="search-bar" id="searchInput" placeholder="Search ${i.title.toLowerCase()}..." style="padding-left:38px;" oninput="onSearch(this.value)" value="${search}">
            </div>
            <select class="filter-select" id="statusFilter" onchange="applyFilter()">
                <option value="">All Status</option><option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option>
            </select>
            <span style="color:var(--muted); font-size:.85rem;" id="recordCount"></span>
        </div>
        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-borderless">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"><tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2" id="paginationArea"></div>
        </div>`;
    await fetchData(mod, page, search);
}

function onSearch(val) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => fetchData(currentModule, 1, val), 400);
}

async function applyFilter() {
    await fetchData(currentModule, 1, document.getElementById('searchInput')?.value || '');
}

async function fetchData(mod, page = 1, search = '') {
    currentPage = page;
    const status = document.getElementById('statusFilter')?.value || '';
    let url = `/${mod}?page=${page}&page_size=10`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (status) url += `&status=${status}`;
    try {
        const res = await api(url);
        const data = await res.json();
        totalPages = data.pages || 1;
        document.getElementById('recordCount').innerText = `${data.total} record${data.total !== 1 ? 's' : ''} found`;
        renderTable(mod, data.items || []);
        renderPagination(page, totalPages, search);
    } catch {
        document.getElementById('table-body').innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="ph ph-warning"></i><h5>Connection Error</h5></div></td></tr>`;
    }
}

function renderPagination(page, total, search) {
    const el = document.getElementById('paginationArea');
    if (!el) return;
    if (total <= 1) { el.innerHTML = ''; return; }
    el.innerHTML = `
        <span style="color:var(--muted); font-size:.85rem;">Page ${page} of ${total}</span>
        <div class="d-flex gap-2">
            <button class="page-btn" onclick="fetchData('${currentModule}',${page-1},'${search}')" ${page<=1?'disabled':''}>
                <i class="ph ph-arrow-left"></i> Prev
            </button>
            <button class="page-btn" onclick="fetchData('${currentModule}',${page+1},'${search}')" ${page>=total?'disabled':''}>
                Next <i class="ph ph-arrow-right"></i>
            </button>
        </div>`;
}

function renderTable(mod, items) {
    if (items.length === 0) {
        document.getElementById('table-head').innerHTML = '';
        document.getElementById('table-body').innerHTML = `<tr><td colspan="6"><div class="empty-state">
            <i class="ph ph-folder-dashed"></i>
            <h5>No Records Found</h5>
            <p style="color:var(--muted);">Click <strong>+ Add New</strong> to create the first record.</p>
        </div></td></tr>`;
        return;
    }
    let th = '', tb = '';
    if (mod === 'departments') {
        th = `<tr><th>Department</th><th>Code</th><th>Cost Center</th><th>Status</th><th class="text-end">Actions</th></tr>`;
        items.forEach(r => tb += `<tr>
            <td><span class="fw-medium">${r.name}</span>${r.description ? `<br><small style="color:var(--muted);">${r.description}</small>` : ''}</td>
            <td style="color:var(--muted);">${r.code||'—'}</td>
            <td>${r.cost_center||'—'}</td>
            <td>${statusBadge(r.status)}</td>
            <td class="text-end">
                <button class="btn-icon me-1" onclick='editDept(${JSON.stringify(r)})'><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-icon danger" onclick="delRecord('departments','${r.id}')"><i class="ph ph-trash"></i></button>
            </td></tr>`);
    } else if (mod === 'designations') {
        th = `<tr><th>Designation</th><th>Grade</th><th>Code</th><th>Status</th><th class="text-end">Actions</th></tr>`;
        items.forEach(r => tb += `<tr>
            <td class="fw-medium">${r.name}</td>
            <td>${r.grade ? `<span class="badge-grade">${r.grade}</span>` : '—'}</td>
            <td style="color:var(--muted);">${r.code||'—'}</td>
            <td>${statusBadge(r.status)}</td>
            <td class="text-end">
                <button class="btn-icon me-1" onclick='editDesig(${JSON.stringify(r)})'><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-icon danger" onclick="delRecord('designations','${r.id}')"><i class="ph ph-trash"></i></button>
            </td></tr>`);
    } else if (mod === 'employees') {
        th = `<tr><th>Employee</th><th>EMP Code</th><th>Category</th><th>Status</th><th class="text-end">Actions</th></tr>`;
        items.forEach(r => tb += `<tr>
            <td>
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">${r.first_name[0]}${(r.last_name||'')[0]||''}</div>
                    <div><div class="fw-medium">${r.first_name} ${r.last_name||''}</div>
                    <div style="color:var(--muted);font-size:.8rem;">${r.email||'No email'}</div></div>
                </div>
            </td>
            <td style="color:var(--muted);">${r.employee_code}</td>
            <td><span style="font-size:.85rem;">${r.category||'—'}</span></td>
            <td>${statusBadge(r.employment_status)}</td>
            <td class="text-end">
                <button class="btn-icon me-1" onclick='viewProfile(${JSON.stringify(r)})'><i class="ph ph-eye"></i></button>
                <button class="btn-icon me-1" onclick='editEmp(${JSON.stringify(r)})'><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-icon danger" onclick="delRecord('employees','${r.id}')"><i class="ph ph-trash"></i></button>
            </td></tr>`);
    }
    document.getElementById('table-head').innerHTML = th;
    document.getElementById('table-body').innerHTML = tb;
}

function statusBadge(s) {
    if (s === 'ACTIVE') return `<span class="badge-active">Active</span>`;
    return `<span class="badge-inactive">${s}</span>`;
}

// ── View Profile ──
function viewProfile(r) {
    document.getElementById('profileBody').innerHTML = `
        <div class="d-flex align-items-center gap-4 mb-4">
            <div class="profile-avatar">${r.first_name[0]}${(r.last_name||'')[0]||''}</div>
            <div>
                <h4 class="fw-bold mb-1">${r.first_name} ${r.last_name||''}</h4>
                <div style="color:var(--muted);">${r.employee_code} · ${r.category||'—'}</div>
                <div class="mt-2">${statusBadge(r.employment_status)}</div>
            </div>
        </div>
        <div class="row g-3">
            ${pf('Email', r.email||'—')}${pf('Phone', r.phone||'—')}
            ${pf('Gender', r.gender||'—')}${pf('Blood Group', r.blood_group||'—')}
            ${pf('Date of Birth', r.date_of_birth||'—')}${pf('Joining Date', r.joining_date||'—')}
            ${pf('Qualification', r.qualification||'—')}${pf('Specialty', r.specialty||'—')}
            ${pf('Experience', r.experience_years ? r.experience_years+' years' : '—')}
        </div>`;
    new bootstrap.Modal(document.getElementById('profileModal')).show();
}

function pf(label, val) {
    return `<div class="col-md-4"><div class="profile-field">
        <div class="profile-field-label">${label}</div>
        <div class="profile-field-value">${val}</div>
    </div></div>`;
}

// ── Delete ──
async function delRecord(mod, id) {
    if (!confirm('Delete this record?')) return;
    const res = await api(`/${mod}/${id}`, { method: 'DELETE' });
    if (res.ok) { toast('Record deleted!'); fetchData(mod, currentPage); }
    else toast('Error deleting!', false);
}

// ── Open Add Modal ──
async function openAddModal() {
    if (currentModule === 'departments') {
        clearDept(); document.getElementById('deptModalTitle').innerHTML = '<i class="ph ph-buildings me-2" style="color:#818cf8;"></i>Add Department';
        new bootstrap.Modal(document.getElementById('deptModal')).show();
    } else if (currentModule === 'designations') {
        clearDesig(); document.getElementById('desigModalTitle').innerHTML = '<i class="ph ph-tag me-2" style="color:#818cf8;"></i>Add Designation';
        new bootstrap.Modal(document.getElementById('desigModal')).show();
    } else if (currentModule === 'employees') {
        clearEmp(); await loadDropdowns();
        document.getElementById('empModalTitle').innerHTML = '<i class="ph ph-user-plus me-2" style="color:#818cf8;"></i>Add Employee';
        new bootstrap.Modal(document.getElementById('empModal')).show();
    }
}

// ── Load dropdowns ──
async function loadDropdowns() {
    const [dr, dgr] = await Promise.all([api('/departments?page_size=100'), api('/designations?page_size=100')]);
    const [dd, dgd] = await Promise.all([dr.json(), dgr.json()]);
    depts = dd.items || []; desigs = dgd.items || [];
    const ds = document.getElementById('empDept');
    const dsg = document.getElementById('empDesig');
    ds.innerHTML = '<option value="">-- Select Department --</option>' + depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    dsg.innerHTML = '<option value="">-- Select Designation --</option>' + desigs.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
}

// ── Dept helpers ──
function clearDept() { ['deptId','deptName','deptCode','deptCostCenter','deptDesc'].forEach(f => document.getElementById(f).value=''); document.getElementById('deptStatus').value='ACTIVE'; }
function editDept(r) {
    document.getElementById('deptId').value = r.id;
    document.getElementById('deptName').value = r.name;
    document.getElementById('deptCode').value = r.code||'';
    document.getElementById('deptCostCenter').value = r.cost_center||'';
    document.getElementById('deptDesc').value = r.description||'';
    document.getElementById('deptStatus').value = r.status;
    document.getElementById('deptModalTitle').innerHTML = '<i class="ph ph-buildings me-2" style="color:#818cf8;"></i>Edit Department';
    new bootstrap.Modal(document.getElementById('deptModal')).show();
}
async function saveDept() {
    const id = document.getElementById('deptId').value;
    const body = { name: document.getElementById('deptName').value, code: document.getElementById('deptCode').value||null, cost_center: document.getElementById('deptCostCenter').value||null, description: document.getElementById('deptDesc').value||null, status: document.getElementById('deptStatus').value };
    if (!body.name) { toast('Name is required!', false); return; }
    const res = await api(id ? `/departments/${id}` : '/departments', { method: id ? 'PUT' : 'POST', body: JSON.stringify(body) });
    if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('deptModal')).hide(); toast(id ? 'Department updated!' : 'Department created!'); fetchData('departments', currentPage); }
    else toast('Error saving!', false);
}

// ── Desig helpers ──
function clearDesig() { ['desigId','desigName','desigCode','desigDesc'].forEach(f => document.getElementById(f).value=''); document.getElementById('desigGrade').value=''; document.getElementById('desigStatus').value='ACTIVE'; }
function editDesig(r) {
    document.getElementById('desigId').value = r.id;
    document.getElementById('desigName').value = r.name;
    document.getElementById('desigCode').value = r.code||'';
    document.getElementById('desigGrade').value = r.grade||'';
    document.getElementById('desigDesc').value = r.description||'';
    document.getElementById('desigStatus').value = r.status;
    document.getElementById('desigModalTitle').innerHTML = '<i class="ph ph-tag me-2" style="color:#818cf8;"></i>Edit Designation';
    new bootstrap.Modal(document.getElementById('desigModal')).show();
}
async function saveDesig() {
    const id = document.getElementById('desigId').value;
    const body = { name: document.getElementById('desigName').value, code: document.getElementById('desigCode').value||null, grade: document.getElementById('desigGrade').value||null, description: document.getElementById('desigDesc').value||null, status: document.getElementById('desigStatus').value };
    if (!body.name) { toast('Name is required!', false); return; }
    const res = await api(id ? `/designations/${id}` : '/designations', { method: id ? 'PUT' : 'POST', body: JSON.stringify(body) });
    if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('desigModal')).hide(); toast(id ? 'Designation updated!' : 'Designation created!'); fetchData('designations', currentPage); }
    else toast('Error saving!', false);
}

// ── Emp helpers ──
function clearEmp() { ['empId','empFirstName','empLastName','empEmail','empPhone','empDob','empJoining','empQual','empSpec','empExp'].forEach(f => document.getElementById(f).value=''); ['empGender','empBlood','empCategory'].forEach(f => document.getElementById(f).value=''); document.getElementById('empStatus').value='ACTIVE'; }
function editEmp(r) {
    clearEmp();
    loadDropdowns().then(() => {
        document.getElementById('empId').value = r.id;
        document.getElementById('empFirstName').value = r.first_name;
        document.getElementById('empLastName').value = r.last_name||'';
        document.getElementById('empEmail').value = r.email||'';
        document.getElementById('empPhone').value = r.phone||'';
        document.getElementById('empGender').value = r.gender||'';
        document.getElementById('empBlood').value = r.blood_group||'';
        document.getElementById('empDob').value = r.date_of_birth||'';
        document.getElementById('empCategory').value = r.category||'';
        document.getElementById('empJoining').value = r.joining_date||'';
        document.getElementById('empQual').value = r.qualification||'';
        document.getElementById('empSpec').value = r.specialty||'';
        document.getElementById('empExp').value = r.experience_years||'';
        document.getElementById('empStatus').value = r.employment_status;
        if (r.department_id) document.getElementById('empDept').value = r.department_id;
        if (r.designation_id) document.getElementById('empDesig').value = r.designation_id;
        document.getElementById('empModalTitle').innerHTML = '<i class="ph ph-pencil-simple me-2" style="color:#818cf8;"></i>Edit Employee';
        new bootstrap.Modal(document.getElementById('empModal')).show();
    });
}
async function saveEmp() {
    const id = document.getElementById('empId').value;
    const body = {
        first_name: document.getElementById('empFirstName').value,
        last_name: document.getElementById('empLastName').value||null,
        email: document.getElementById('empEmail').value||null,
        phone: document.getElementById('empPhone').value||null,
        gender: document.getElementById('empGender').value||null,
        blood_group: document.getElementById('empBlood').value||null,
        date_of_birth: document.getElementById('empDob').value||null,
        department_id: document.getElementById('empDept').value||null,
        designation_id: document.getElementById('empDesig').value||null,
        category: document.getElementById('empCategory').value||null,
        joining_date: document.getElementById('empJoining').value||null,
        qualification: document.getElementById('empQual').value||null,
        specialty: document.getElementById('empSpec').value||null,
        experience_years: document.getElementById('empExp').value||null,
        employment_status: document.getElementById('empStatus').value,
    };
    if (!body.first_name) { toast('First name is required!', false); return; }
    const res = await api(id ? `/employees/${id}` : '/employees', { method: id ? 'PUT' : 'POST', body: JSON.stringify(body) });
    if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('empModal')).hide(); toast(id ? 'Employee updated!' : 'Employee created!'); fetchData('employees', currentPage); }
    else toast('Error saving!', false);
}

// Init
showDashboard();
</script>
</body>
</html>
